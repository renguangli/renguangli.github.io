# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: 大力的技术博客 # ex. I m Guangli
name: dali`s Blogs  # ex. Guangli
email: renguangligg@gmail.com
location: Beijing # ex. Nice, France
company: Rgl
company_url: https://renguangli.com
github_url: https://github.com/renguangli # ex. https://github.com/renguangli
github_username: renguangli # ex. renguangli
description: 分享 Java 相关技术，记录成长过程
favicon: favicon.png # Image must be in assets/images
repository: renguangli/renguangli.github.io # ex. renguangli/renguangli.github.io

# The base hostname & protocol for your site
# For local test, please use http://localhost:4000
# For production, use your github page url. ex. https://renguangli.com
url: https://renguangli.com
staticUrl: https://rgl-1252211075.cos.ap-beijing.myqcloud.com
subscribe_rss: /feed.xml

## Gem
gems:
  - jekyll-paginate
  - jekyll-geo-pattern
  - rouge
  - kramdown
  - jekyll-github-metadata

# Build settings
markdown: kramdown
highlighter: rouge
lsi:         false
excerpt_separator: "\n\n"
permalink: /articles/:title

source:      .
destination: ./_site

quiet:    false
defaults: []

kramdown:
  input: GFM
  enable_coderay: true

# Disque
# disque: my_disque_settings # ex. httpdongchuangithubio.disqus.com

# https://github.com/gitalk/gitalk#install
gitalk:
  enable: true
  owner: renguangli
  repo: comments
  clientID: 8ff7ae9648607fe6e4b3
  clientSecret: 5ffe44de3ec03f5072ff5641e1d5aa58a9138c16

# Pagination
paginate: 10
paginate_path: 'page:num'

# Navigation. If you do not like these modules, just remove them :D
navs:
#  -
#    href: /
#    label: 主页

    #  -
    #    href: /open-source
#    label: Open-Source
  -
    href: /bookmark
    label: BookMark

  -
    href: /about
    label: About

# Google Analytics
analytics :
  provider : google
  google :
      tracking_id : 'UA-106555827-1'  # ex. UA-72165600-X

# For about.html. Fell free to create your own!
skill_software_keywords: [Java, MySQL, Oracle, Redis, Design Patterns]
skill_j2ee_keywords: [Spring, Spring-boot, Spring-cloud, Hibernate, MyBatis, JSP, Servlet]
skill_web_keywords: [HTML, CSS, JS, JQuery, Ajax, NodeJS, Vue, Boostrap]
