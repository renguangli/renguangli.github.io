<section class="jumbotron geopattern" data-pattern-id="{{ page.title }}">
    <div class="container">
        <div id="jumbotron-meta-info">
            <h1>{{ page.title }}</h1>
            <span class="meta-info">
                {% if page.subtitle %}
                    {{ page.subtitle }}
                {% endif %}
                {% if page.date %}
                <span class="octicon octicon-calendar"></span>
                <span style="font-size: 18px;vertical-align: middle;">{{ page.date | date: "%Y/%m/%d" }}</span>
                {% endif %}
                {% if page.categories %}
                    {% for cat in page.categories %}
                        <span class="octicon octicon-file-directory" style="margin-left: 5px;"></span>
                        <span class="hvr-grow">
                            <a href="/articles#{{ cat }}" title="{{ cat }}">{{ cat }}</a>
                        </span>
                    {% endfor %}
                {% endif %}
                <span id="busuanzi_container_page_pv">
                    <span class="octicon octicon-eye hvr-grow"></span>
                    <span style="vertical-align: middle;font-size: 18px;">阅读量<span id="busuanzi_value_page_pv"></span>次</span>
                </span>
            </span>
        </div>
    </div>
</section>
<script>
    $(document).ready(function(){

        $('.geopattern').each(function(){
            $(this).geopattern($(this).data('pattern-id'));
        });

    });
</script>
